<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کوردستان تا جیهان</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600;700;900&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4AF37;
    --gold-light: #F4D03F;
    --gold-dark: #A07D1C;
    --green: #1A5C2A;
    --green-light: #27AE60;
    --red: #8B1A1A;
    --red-light: #E74C3C;
    --cream: #FDF6E3;
    --dark: #0D0D0D;
    --dark2: #1A1A1A;
    --dark3: #252525;
    --text: #F0E6C8;
    --text-muted: #A89060;
    --player1: #E74C3C;
    --player2: #3498DB;
    --player3: #2ECC71;
    --player4: #F39C12;
    --player5: #9B59B6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans Arabic', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    direction: rtl;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(212,175,55,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(26,92,42,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(139,26,26,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Geometric pattern overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(212,175,55,0.02) 40px, rgba(212,175,55,0.02) 41px),
      repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(212,175,55,0.02) 40px, rgba(212,175,55,0.02) 41px);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; animation: fadeIn 0.5s ease; }
  .screen.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== HEADER ===== */
  .game-header {
    text-align: center;
    padding: 40px 20px 30px;
  }

  .game-title {
    font-family: 'Noto Sans Arabic', sans-serif;
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    letter-spacing: -1px;
    text-shadow: none;
  }

  .game-subtitle {
    font-size: 1rem;
    color: var(--text-muted);
    margin-top: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .title-decoration {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 16px 0;
  }

  .title-decoration::before,
  .title-decoration::after {
    content: '';
    flex: 1;
    max-width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .title-star {
    color: var(--gold);
    font-size: 1.2rem;
  }

  /* ===== SETUP SCREEN ===== */
  .setup-card {
    background: linear-gradient(135deg, var(--dark2), var(--dark3));
    border: 1px solid rgba(212,175,55,0.2);
    border-radius: 20px;
    padding: 40px;
    margin: 20px 0;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(212,175,55,0.1);
  }

  .setup-title {
    font-size: 1.1rem;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .setup-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(212,175,55,0.2);
  }

  /* Player count selector */
  .player-count-grid {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 30px;
  }

  .count-btn {
    flex: 1;
    min-width: 80px;
    padding: 20px 10px;
    background: var(--dark3);
    border: 2px solid rgba(212,175,55,0.15);
    border-radius: 14px;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 1.5rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
  }

  .count-btn span {
    display: block;
    font-size: 0.65rem;
    font-weight: 400;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .count-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(212,175,55,0.15);
  }

  .count-btn.selected {
    background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 20px rgba(212,175,55,0.2);
  }

  /* Player name inputs */
  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 30px;
  }

  .player-input-wrap {
    position: relative;
  }

  .player-color-dot {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .player-input {
    width: 100%;
    padding: 14px 40px 14px 16px;
    background: var(--dark);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    transition: all 0.3s;
    text-align: right;
  }

  .player-input:focus {
    outline: none;
    border-color: rgba(212,175,55,0.4);
    background: rgba(212,175,55,0.04);
  }

  /* Question count */
  .q-count-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }

  .q-count-label {
    color: var(--text-muted);
    font-size: 0.9rem;
    white-space: nowrap;
  }

  .q-btns {
    display: flex;
    gap: 8px;
  }

  .q-btn {
    padding: 8px 20px;
    background: var(--dark3);
    border: 1px solid rgba(212,175,55,0.15);
    border-radius: 8px;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .q-btn:hover, .q-btn.selected {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* Category selector */
  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 30px;
  }

  .cat-btn {
    padding: 16px 12px;
    background: var(--dark3);
    border: 2px solid rgba(212,175,55,0.12);
    border-radius: 14px;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
    line-height: 1.4;
  }

  .cat-btn .cat-icon { font-size: 1.6rem; display: block; margin-bottom: 6px; }

  .cat-btn:hover {
    border-color: rgba(212,175,55,0.4);
    color: var(--text);
    transform: translateY(-2px);
  }

  .cat-btn.selected {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(212,175,55,0.08);
  }

  /* Start button */
  .btn-start {
    width: 100%;
    padding: 20px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border: none;
    border-radius: 14px;
    color: var(--dark);
    font-family: inherit;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
    box-shadow: 0 8px 30px rgba(212,175,55,0.3);
  }

  .btn-start:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(212,175,55,0.4);
  }

  .btn-start:active { transform: translateY(0); }

  /* ===== GAME SCREEN ===== */

  /* Scoreboard */
  .scoreboard {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .score-card {
    flex: 1;
    min-width: 120px;
    background: var(--dark2);
    border: 2px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 14px 12px;
    text-align: center;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .score-card.active-player {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(212,175,55,0.2);
    transform: translateY(-4px);
  }

  .score-card.active-player::before {
    content: '▼ نۆبەتت';
    position: absolute;
    top: -1px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: var(--dark);
    font-size: 0.6rem;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 0 0 8px 8px;
    white-space: nowrap;
  }

  .score-name {
    font-size: 0.8rem;
    font-weight: 600;
    margin-top: 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .score-points {
    font-size: 1.8rem;
    font-weight: 900;
    line-height: 1;
    margin: 4px 0;
  }

  .score-streak {
    font-size: 0.65rem;
    color: var(--text-muted);
  }

  /* Progress bar */
  .progress-wrap {
    background: var(--dark2);
    border-radius: 20px;
    height: 6px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
    border-radius: 20px;
    transition: width 0.5s ease;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  /* Timer */
  .timer-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .timer-ring {
    position: relative;
    width: 70px;
    height: 70px;
  }

  .timer-ring svg {
    transform: rotate(-90deg);
  }

  .timer-ring circle {
    fill: none;
    stroke-width: 5;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
  }

  .timer-ring .bg { stroke: rgba(255,255,255,0.08); }
  .timer-ring .fg { stroke: var(--gold); }

  .timer-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--gold);
  }

  /* Question card */
  .question-card {
    background: linear-gradient(135deg, var(--dark2), var(--dark3));
    border: 1px solid rgba(212,175,55,0.2);
    border-radius: 20px;
    padding: 36px;
    margin-bottom: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(212,175,55,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .question-category-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-bottom: 18px;
    letter-spacing: 0.5px;
    border: 1px solid currentColor;
  }

  .question-text {
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    font-weight: 600;
    line-height: 1.6;
    color: var(--text);
  }

  /* Answers grid */
  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }

  .answer-btn {
    padding: 20px 16px;
    background: var(--dark2);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
    text-align: right;
    line-height: 1.4;
    position: relative;
    overflow: hidden;
  }

  .answer-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.02));
  }

  .answer-btn:hover:not(:disabled) {
    border-color: var(--gold);
    color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(212,175,55,0.15);
  }

  .answer-btn.correct {
    background: rgba(39,174,96,0.15);
    border-color: var(--green-light);
    color: var(--green-light);
    animation: correctPulse 0.5s ease;
  }

  .answer-btn.wrong {
    background: rgba(231,76,60,0.12);
    border-color: var(--red-light);
    color: var(--red-light);
    animation: shake 0.4s ease;
  }

  .answer-btn:disabled { cursor: not-allowed; }

  @keyframes correctPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.03); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* Feedback banner */
  .feedback-banner {
    padding: 16px 24px;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 600;
    text-align: center;
    margin-bottom: 16px;
    display: none;
    animation: slideUp 0.3s ease;
  }

  .feedback-banner.show { display: block; }

  .feedback-banner.correct-fb {
    background: rgba(39,174,96,0.15);
    border: 1px solid rgba(39,174,96,0.4);
    color: var(--green-light);
  }

  .feedback-banner.wrong-fb {
    background: rgba(231,76,60,0.1);
    border: 1px solid rgba(231,76,60,0.3);
    color: #ff8080;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Turn indicator */
  .turn-indicator {
    text-align: center;
    padding: 14px;
    background: var(--dark2);
    border-radius: 12px;
    font-size: 0.9rem;
    margin-bottom: 20px;
    border: 1px solid rgba(212,175,55,0.12);
  }

  .turn-name {
    font-weight: 700;
    font-size: 1.1rem;
  }

  /* ===== RESULTS SCREEN ===== */
  .results-header {
    text-align: center;
    padding: 40px 20px 20px;
  }

  .trophy-emoji {
    font-size: 5rem;
    display: block;
    margin-bottom: 16px;
    animation: bounce 1s ease infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .winner-name {
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .winner-sub {
    color: var(--text-muted);
    margin-top: 6px;
  }

  .final-scores {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin: 30px 0;
  }

  .final-score-row {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 18px 20px;
    transition: all 0.3s;
  }

  .final-score-row:first-child {
    border-color: var(--gold);
    background: rgba(212,175,55,0.06);
    box-shadow: 0 0 30px rgba(212,175,55,0.1);
  }

  .rank-badge {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .final-player-name {
    flex: 1;
    font-weight: 600;
    font-size: 1rem;
  }

  .final-player-pts {
    font-size: 1.4rem;
    font-weight: 900;
  }

  .btn-restart {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border: none;
    border-radius: 14px;
    color: var(--dark);
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 10px;
    letter-spacing: 0.5px;
  }

  .btn-restart:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(212,175,55,0.35);
  }

  /* Points popup */
  .pts-popup {
    position: fixed;
    pointer-events: none;
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    z-index: 9999;
    animation: floatUp 1.2s ease forwards;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .answers-grid { grid-template-columns: 1fr; }
    .setup-card { padding: 24px; }
    .question-card { padding: 24px; }
    .scoreboard { gap: 6px; }
    .score-card { min-width: 90px; padding: 10px 8px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- SETUP SCREEN -->
  <div class="screen active" id="screen-setup">
    <div class="game-header">
      <h1 class="game-title">🌍 کوردستان تا جیهان</h1>
      <div class="title-decoration">
        <span class="title-star">✦</span>
        <span class="title-star">✦</span>
        <span class="title-star">✦</span>
      </div>
      <p class="game-subtitle">یاری زانستی جوگرافیا</p>
    </div>

    <div class="setup-card">
      <div class="setup-title">🎮 ژمارەی یارمەتیدەران</div>
      <div class="player-count-grid">
        <button class="count-btn" data-count="2" onclick="selectCount(2)">2<span>کەس</span></button>
        <button class="count-btn" data-count="3" onclick="selectCount(3)">3<span>کەس</span></button>
        <button class="count-btn selected" data-count="4" onclick="selectCount(4)">4<span>کەس</span></button>
        <button class="count-btn" data-count="5" onclick="selectCount(5)">5<span>کەس</span></button>
      </div>

      <div class="setup-title">👥 ناوی یارمەتیدەران</div>
      <div class="players-grid" id="players-grid"></div>

      <div class="setup-title">📚 جۆری پرسیار</div>
      <div class="category-grid">
        <button class="cat-btn selected" data-cat="all" onclick="selectCat(this,'all')">
          <span class="cat-icon">🌐</span>هەمووی
        </button>
        <button class="cat-btn" data-cat="kurdistan" onclick="selectCat(this,'kurdistan')">
          <span class="cat-icon">🏔️</span>کوردستان
        </button>
        <button class="cat-btn" data-cat="world" onclick="selectCat(this,'world')">
          <span class="cat-icon">🌍</span>جیهان
        </button>
        <button class="cat-btn" data-cat="history" onclick="selectCat(this,'history')">
          <span class="cat-icon">📜</span>مێژوو
        </button>
      </div>

      <div class="setup-title">❓ ژمارەی پرسیار</div>
      <div class="q-count-row">
        <span class="q-count-label">هەر کەسێک:</span>
        <div class="q-btns">
          <button class="q-btn" onclick="selectQCount(5,this)">5</button>
          <button class="q-btn selected" onclick="selectQCount(10,this)">10</button>
          <button class="q-btn" onclick="selectQCount(15,this)">15</button>
        </div>
      </div>

      <button class="btn-start" onclick="startGame()">🚀 دەستپێکردنی یاری</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="screen-game">
    <div class="scoreboard" id="scoreboard"></div>

    <div class="progress-info">
      <span id="q-counter">پرسیار ١ / ١٠</span>
      <span id="round-info">ئاست: کوردستان</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>

    <div class="turn-indicator" id="turn-indicator">
      <span id="turn-label">نۆبەتی</span> <span class="turn-name" id="turn-name-display"></span>
    </div>

    <div class="timer-wrap">
      <div class="timer-ring">
        <svg width="70" height="70" viewBox="0 0 70 70">
          <circle class="bg" cx="35" cy="35" r="30" />
          <circle class="fg" id="timer-circle" cx="35" cy="35" r="30"
            stroke-dasharray="188.5" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-number" id="timer-num">20</div>
      </div>
    </div>

    <div class="question-card">
      <div class="question-category-badge" id="q-badge">🏔️ کوردستان</div>
      <p class="question-text" id="question-text">پرسیار لێرەدایە...</p>
    </div>

    <div class="answers-grid" id="answers-grid"></div>

    <div class="feedback-banner" id="feedback-banner"></div>
  </div>

  <!-- RESULTS SCREEN -->
  <div class="screen" id="screen-results">
    <div class="results-header">
      <span class="trophy-emoji">🏆</span>
      <div class="winner-name" id="winner-name">—</div>
      <div class="winner-sub">بەرپرسی یارییەکە!</div>
    </div>
    <div class="final-scores" id="final-scores"></div>
    <button class="btn-restart" onclick="goSetup()">🔄 دووبارە یاری بکە</button>
  </div>

</div>

<script>
// ============================================================
//  DATA
// ============================================================
const COLORS = ['--player1','--player2','--player3','--player4','--player5'];
const COLOR_HEX = ['#E74C3C','#3498DB','#2ECC71','#F39C12','#9B59B6'];
const RANK_EMOJI = ['🥇','🥈','🥉','4️⃣','5️⃣'];

const ALL_QUESTIONS = [
  // KURDISTAN
  { cat:'kurdistan', level:'کوردستان', icon:'🏔️', color:'#E8A735',
    q:'پایتەختی هەرێمی کوردستانی عێراق کامە?',
    a:['هەولێر','سلێمانی','دهۆک','کەرکووک'], correct:0 },
  { cat:'kurdistan', level:'کوردستان', icon:'🏔️', color:'#E8A735',
    q:'چیای هەڵگورد چەند مەتری بەرزییەکیەتی?',
    a:['٣,٦٠٠ م','٣,٩٠٠ م','٤,١٦٨ م','٤,٥٠٠ م'], correct:2 },
  { cat:'kurdistan', level:'کوردستان', icon:'🏔️', color:'#E8A735',
    q:'دریاچەی دوکان لە کام پارێزگایەکدایە?',
    a:['هەولێر','سلێمانی','دهۆک','کەرکووک'], correct:1 },
  { cat:'kurdistan', level:'کوردستان', icon:'🏔️', color:'#E8A735',
    q:'کام شارە بە "شاری گوڵ" ناسراوە?',
    a:['هەولێر','زاخۆ','سلێمانی','عەقرە'], correct:2 },
  { cat:'kurdistan', level:'کوردستان', icon:'🏔️', color:'#E8A735',
    q:'ئاوڕووباری شاخی عەلان لە کام پارێزگاییەدایە?',
    a:['هەولێر','سلێمانی','دهۆک','زاخۆ'], correct:0 },
  { cat:'kurdistan', level:'کوردستان', icon:'🏔️', color:'#E8A735',
    q:'ئەمباری ئاوی دوکان لەسەر کام رووباریەکدا دروست کراوە?',
    a:['دیالە','زاب','تیگریس','فرات'], correct:1 },
  { cat:'kurdistan', level:'کوردستان', icon:'🏔️', color:'#E8A735',
    q:'کام شار بە "پایتەختی کولتووری کوردستان" ناسراوە?',
    a:['هەولێر','دهۆک','سلێمانی','رانیە'], correct:2 },
  { cat:'kurdistan', level:'کوردستان', icon:'🏔️', color:'#E8A735',
    q:'گۆپالی کوردی بە کام زمانێکی دیکە "داربوکا" دەڵێن?',
    a:['عەرەبی','فارسی','تورکی','ئینگلیزی'], correct:0 },
  { cat:'kurdistan', level:'کوردستان', icon:'🏔️', color:'#E8A735',
    q:'ناوچەی بەرزەی شێلادزە لە کام شووێنێکدایە?',
    a:['دهۆک','زاخۆ','بەهدینان','هەولێر'], correct:0 },
  { cat:'kurdistan', level:'کوردستان', icon:'🏔️', color:'#E8A735',
    q:'قەڵای هەولێر چەند ساڵی کۆنییەتی?',
    a:['٢٠٠٠ ساڵ','٤٠٠٠ ساڵ','٦٠٠٠ ساڵ','٨٠٠٠ ساڵ'], correct:2 },

  // WORLD
  { cat:'world', level:'جیهان', icon:'🌍', color:'#3498DB',
    q:'پایتەختی ژاپۆن کامە?',
    a:['ئۆزاکا','ئۆکیۆ','کیۆتۆ','هیرۆشیما'], correct:1 },
  { cat:'world', level:'جیهان', icon:'🌍', color:'#3498DB',
    q:'درێژترین ڕووباری جیهان کامە?',
    a:['ئەمازۆن','نیل','یانگتزی','میسیسیپی'], correct:1 },
  { cat:'world', level:'جیهان', icon:'🌍', color:'#3498DB',
    q:'گەورەترین پارێزگاری جیهان لە ئاستا کامە?',
    a:['کانەدا','ڕووسیا','ئۆسترالیا','بەرازیل'], correct:1 },
  { cat:'world', level:'جیهان', icon:'🌍', color:'#3498DB',
    q:'بەرزترین چیای جیهان کامە?',
    a:['K2','ئەنایاپورنا','ئێڤەرێست','کانچێنجوونگا'], correct:2 },
  { cat:'world', level:'جیهان', icon:'🌍', color:'#3498DB',
    q:'پایتەختی کانەدا کامە?',
    a:['تۆرۆنتۆ','مۆنتریال','ئۆتاوا','ڤانکووڤەر'], correct:2 },
  { cat:'world', level:'جیهان', icon:'🌍', color:'#3498DB',
    q:'کام وڵات زۆرترین دانیشتووانی جیهانی هەیە؟',
    a:['ئیندیا','چین','ئەمریکا','ئیندۆنیزیا'], correct:1 },
  { cat:'world', level:'جیهان', icon:'🌍', color:'#3498DB',
    q:'پایتەختی بەرازیل کامە?',
    a:['ریۆ دی جانیرۆ','سائۆ پاولۆ','براسیلیا','مانائۆس'], correct:2 },
  { cat:'world', level:'جیهان', icon:'🌍', color:'#3498DB',
    q:'کام وڵات بە "خاکی گەرمخۆش" ناسراوە?',
    a:['مەکسیک','ئیسپانیا','کۆلۆمبیا','ئارجەنتینا'], correct:0 },
  { cat:'world', level:'جیهان', icon:'🌍', color:'#3498DB',
    q:'پایتەختی ئۆسترالیا کامە?',
    a:['سیدنی','مێڵبورن','کانبێرا','پێرت'], correct:2 },
  { cat:'world', level:'جیهان', icon:'🌍', color:'#3498DB',
    q:'کام وڵات بچووکترین وڵاتی جیهانە?',
    a:['مۆناکۆ','لیختنستاین','ڤاتیکان','سان مارینۆ'], correct:2 },

  // HISTORY
  { cat:'history', level:'مێژوو', icon:'📜', color:'#9B59B6',
    q:'شەڕی دووەمی جیهانی کەی کۆتایی هات?',
    a:['١٩٤٣','١٩٤٤','١٩٤٥','١٩٤٦'], correct:2 },
  { cat:'history', level:'مێژوو', icon:'📜', color:'#9B59B6',
    q:'کام شارێکی کوردنشین بوو کە مێژووی ٦ هەزار ساڵیەتی?',
    a:['هەولێر','مۆسڵ','کەرکووک','زاخۆ'], correct:0 },
  { cat:'history', level:'مێژوو', icon:'📜', color:'#9B59B6',
    q:'مێژووی ئایارەکانی کوردستان (١٩٩١) چی بوو?',
    a:['داهاتنی دیموکراسی','راپەڕین','دامەزراندنی پارتەکان','بەرپرسی ئابووری'], correct:1 },
  { cat:'history', level:'مێژوو', icon:'📜', color:'#9B59B6',
    q:'شارستانیی سومەری لە کام سەردەمێکدا هاتە ئاراوە?',
    a:['٥٠٠٠ ک','٤٠٠٠ ک','٣٠٠٠ ک','٢٠٠٠ ک'], correct:1 },
  { cat:'history', level:'مێژوو', icon:'📜', color:'#9B59B6',
    q:'دیوارەکانی بابیل کە بە ماڵی جیهانن لە کام وڵاتیەکدان?',
    a:['سووریا','عێراق','ئێران','تورکیا'], correct:1 },
];

// ============================================================
//  STATE
// ============================================================
let state = {
  playerCount: 4,
  playerNames: [],
  scores: [],
  streaks: [],
  category: 'all',
  questionsPerPlayer: 10,
  currentPlayer: 0,
  currentQ: 0,
  totalQs: 0,
  questions: [],
  timerInterval: null,
  timeLeft: 20,
  answered: false,
};

// ============================================================
//  SETUP
// ============================================================
function selectCount(n) {
  state.playerCount = n;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`.count-btn[data-count="${n}"]`).classList.add('selected');
  renderPlayerInputs();
}

function selectCat(el, cat) {
  state.category = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function selectQCount(n, el) {
  state.questionsPerPlayer = n;
  document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function renderPlayerInputs() {
  const grid = document.getElementById('players-grid');
  grid.innerHTML = '';
  for (let i = 0; i < state.playerCount; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'player-input-wrap';
    wrap.innerHTML = `
      <span class="player-color-dot" style="background:${COLOR_HEX[i]}"></span>
      <input class="player-input" type="text" id="player-${i}"
        placeholder="یارمەتیدەر ${i+1}" value="${state.playerNames[i]||''}">
    `;
    grid.appendChild(wrap);
  }
}

function startGame() {
  // Collect names
  state.playerNames = [];
  for (let i = 0; i < state.playerCount; i++) {
    const val = document.getElementById(`player-${i}`).value.trim();
    state.playerNames.push(val || `یارمەتیدەر ${i+1}`);
  }
  state.scores = Array(state.playerCount).fill(0);
  state.streaks = Array(state.playerCount).fill(0);
  state.currentPlayer = 0;
  state.currentQ = 0;

  // Build question pool
  let pool = ALL_QUESTIONS.filter(q =>
    state.category === 'all' || q.cat === state.category
  );
  // Shuffle
  pool = pool.sort(() => Math.random() - 0.5);
  state.questions = [];
  const totalNeeded = state.questionsPerPlayer * state.playerCount;
  while (state.questions.length < totalNeeded) {
    state.questions.push(...pool.sort(() => Math.random() - 0.5));
  }
  state.questions = state.questions.slice(0, totalNeeded);
  state.totalQs = state.questions.length;

  showScreen('game');
  renderScoreboard();
  loadQuestion();
}

// ============================================================
//  GAME
// ============================================================
function renderScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  state.playerNames.forEach((name, i) => {
    const card = document.createElement('div');
    card.className = 'score-card' + (i === state.currentPlayer ? ' active-player' : '');
    card.id = `score-card-${i}`;
    card.innerHTML = `
      <div class="score-points" style="color:${COLOR_HEX[i]}">${state.scores[i]}</div>
      <div class="score-name">${name}</div>
      <div class="score-streak">${state.streaks[i] > 1 ? '🔥 '+state.streaks[i]+' پشتەیاری' : '&nbsp;'}</div>
    `;
    sb.appendChild(card);
  });
}

function loadQuestion() {
  if (state.currentQ >= state.totalQs) {
    endGame(); return;
  }
  const q = state.questions[state.currentQ];
  const pName = state.playerNames[state.currentPlayer];

  // Turn indicator
  document.getElementById('turn-name-display').textContent = pName;
  document.getElementById('turn-name-display').style.color = COLOR_HEX[state.currentPlayer];

  // Progress
  const pct = (state.currentQ / state.totalQs) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('q-counter').textContent =
    `پرسیار ${toKurdishNum(state.currentQ+1)} / ${toKurdishNum(state.totalQs)}`;
  document.getElementById('round-info').textContent = `ئاست: ${q.level}`;

  // Badge
  const badge = document.getElementById('q-badge');
  badge.textContent = `${q.icon} ${q.level}`;
  badge.style.color = q.color;
  badge.style.borderColor = q.color;
  badge.style.background = hexToRgba(q.color, 0.1);

  // Question
  document.getElementById('question-text').textContent = q.q;

  // Answers
  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';
  const labels = ['أ','ب','ج','د'];
  q.a.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span style="color:${COLOR_HEX[state.currentPlayer]};margin-left:8px;font-weight:700">${labels[i]}</span> ${ans}`;
    btn.onclick = () => selectAnswer(i, btn, q);
    grid.appendChild(btn);
  });

  // Feedback
  const fb = document.getElementById('feedback-banner');
  fb.className = 'feedback-banner';
  fb.textContent = '';

  state.answered = false;
  startTimer(q);
}

function startTimer(q) {
  clearInterval(state.timerInterval);
  state.timeLeft = 20;
  updateTimerUI(20, 20);

  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    updateTimerUI(state.timeLeft, 20);
    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      if (!state.answered) timeUp(q);
    }
  }, 1000);
}

function updateTimerUI(t, max) {
  document.getElementById('timer-num').textContent = t;
  const circ = document.getElementById('timer-circle');
  const r = 30;
  const circumference = 2 * Math.PI * r;
  const offset = circumference * (1 - t / max);
  circ.style.strokeDashoffset = offset;
  circ.style.stroke = t <= 5 ? '#E74C3C' : t <= 10 ? '#F39C12' : 'var(--gold)';
  document.getElementById('timer-num').style.color = t <= 5 ? '#E74C3C' : 'var(--gold)';
}

function timeUp(q) {
  state.answered = true;
  state.streaks[state.currentPlayer] = 0;
  disableAnswers();
  showCorrect(q.correct);
  showFeedback(false, `⏰ کاتەکەت تەواو بوو! وەڵامی دروست: ${q.a[q.correct]}`);
  setTimeout(nextTurn, 2000);
}

function selectAnswer(idx, btn, q) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timerInterval);
  disableAnswers();

  if (idx === q.correct) {
    const bonus = state.timeLeft > 10 ? 20 : state.timeLeft > 5 ? 15 : 10;
    state.scores[state.currentPlayer] += bonus;
    state.streaks[state.currentPlayer]++;
    btn.classList.add('correct');
    showFeedback(true, `✅ ئەوەی! ${bonus} خاڵ بەدەستهێنا! ${state.streaks[state.currentPlayer]>1?'🔥 پشتەیاری x'+state.streaks[state.currentPlayer]:''}`);
    spawnPoints(bonus);
  } else {
    state.streaks[state.currentPlayer] = 0;
    btn.classList.add('wrong');
    showCorrect(q.correct);
    showFeedback(false, `❌ هەڵە! وەڵامی دروست: ${q.a[q.correct]}`);
  }

  renderScoreboard();
  setTimeout(nextTurn, 2000);
}

function showCorrect(correctIdx) {
  document.querySelectorAll('.answer-btn').forEach((b, i) => {
    if (i === correctIdx) b.classList.add('correct');
  });
}

function disableAnswers() {
  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);
}

function showFeedback(isCorrect, msg) {
  const fb = document.getElementById('feedback-banner');
  fb.textContent = msg;
  fb.className = 'feedback-banner show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
}

function nextTurn() {
  state.currentQ++;
  state.currentPlayer = (state.currentPlayer + 1) % state.playerCount;
  renderScoreboard();
  loadQuestion();
}

function spawnPoints(pts) {
  const el = document.createElement('div');
  el.className = 'pts-popup';
  el.textContent = `+${pts}`;
  el.style.left = (30 + Math.random() * 40) + '%';
  el.style.top = '40%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// ============================================================
//  RESULTS
// ============================================================
function endGame() {
  showScreen('results');
  const ranked = state.playerNames
    .map((n, i) => ({ name: n, score: state.scores[i], i }))
    .sort((a, b) => b.score - a.score);

  document.getElementById('winner-name').textContent = ranked[0].name;

  const container = document.getElementById('final-scores');
  container.innerHTML = '';
  ranked.forEach((p, rank) => {
    const row = document.createElement('div');
    row.className = 'final-score-row';
    const badge = document.createElement('div');
    badge.className = 'rank-badge';
    badge.textContent = RANK_EMOJI[rank];
    badge.style.background = hexToRgba(COLOR_HEX[p.i], 0.15);
    badge.style.color = COLOR_HEX[p.i];

    row.innerHTML = `
      <div class="rank-badge" style="background:${hexToRgba(COLOR_HEX[p.i],0.15)};color:${COLOR_HEX[p.i]}">${RANK_EMOJI[rank]}</div>
      <div class="final-player-name" style="color:${COLOR_HEX[p.i]}">${p.name}</div>
      <div class="final-player-pts" style="color:${COLOR_HEX[p.i]}">${p.score} <span style="font-size:.7rem;color:var(--text-muted)">خاڵ</span></div>
    `;
    container.appendChild(row);
  });
}

// ============================================================
//  HELPERS
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function goSetup() {
  clearInterval(state.timerInterval);
  showScreen('setup');
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function toKurdishNum(n) {
  const k = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
  return String(n).split('').map(d => k[+d]||d).join('');
}

// ============================================================
//  INIT
// ============================================================
selectCount(4);
</script>
</body>
</html>
